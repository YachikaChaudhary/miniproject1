<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
</head>
<body>
    <h1>Product Details</h1>
    <div id="product"></div>
    <script>
        // let productId = new URLSearchParams(window.location.search)
        // let id = productId.get("id")
        // console.log(id)

        let queryString = window.location.search;
        console.log("Query String:", queryString);

        let productId = new URLSearchParams(queryString);
        console.log("URLSearchParams:", productId);

        let id = productId.get("id");
        console.log("ID:", id);



        async function productData(){
            let url = `https://dummyjson.com/products/${id}`
            let res = await fetch(url)
            let data = await res.json()

            window.currentProduct = data;

            console.log(data);
            console.log(data.title);
            console.log(data.price);
            console.log(data.thumbnail);

         
            let product = document.getElementById("product");

                product.innerHTML = `<img src="${data.thumbnail}" width="300">

                                    <h2>${data.title}</h2>

                                    <p>${data.description}</p>

                                    <h3>₹ ${Math.ceil(data.price * 95)}</h3>

                                    <button onclick="addToCart()">Add To Cart</button>
                                `;
        }
        productData()
        


        function addToCart(){

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart.push(window.currentProduct);

            localStorage.setItem("cart", JSON.stringify(cart));

            alert("Product Added Successfully!");

            window.location.href = "cart.html";
       }


    </script>

</body>
</html>
